<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <form>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="companyName" class="form-label">Company Name</label>
                            <input type="text" required minlength="5" class="form-control" id="companyName" name="companyName" placeholder="Enter company name" />
                            <div class="text-danger">
                                <span>This is Required</span>
                                <span>Min 5 Char is Required</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="pinCode" class="form-label">Pin Code</label>
                            <input type="text" required minlength="6" class="form-control" id="pinCode" name="pinCode" placeholder="Enter pin code" />
                            <div class="text-danger">
                                <span>Required</span>
                                <span>Min 6 Char needed</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="address" class="form-label">Address</label>
                            <textarea class="form-control" id="address" name="address" rows="3" placeholder="Enter address"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="text" required minlength="10" maxlength="10" class="form-control" id="phone" name="phone" placeholder="Enter phone number" />
                        </div>
                        <div class="col-12 text-end mt-4">
                            <button type="submit" class="btn btn-primary me-2">
                                Save
                            </button>
                            <button type="reset" class="btn btn-secondary">
                                Reset
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
